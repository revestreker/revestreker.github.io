<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketchbook</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100vw; height:100vh;
  background:#080808;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}
.stage {
  width:100%; height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:2400px;
  perspective-origin:50% 50%;
}
#book {
  position:relative;
  box-shadow: 0 50px 140px rgba(0,0,0,0.9), 0 10px 36px rgba(0,0,0,0.6);
}
.pg-under, .pg-top, #flipper {
  position:absolute;
  inset:0;
}
.pg-under { z-index:1; }
.pg-top   { z-index:2; }
#flipper  {
  z-index:3;
  transform-style:preserve-3d;
  will-change:transform;
  pointer-events:none;
  visibility:hidden;
}
.pg-under img, .pg-top img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  user-select:none;
  -webkit-user-drag:none;
  pointer-events:none;
}
.face {
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
}
.face-front img {
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  user-select:none;
  pointer-events:none;
}
#fold-shadow {
  position:absolute;
  inset:0;
  pointer-events:none;
}
.face-back {
  transform:rotateY(180deg);
  background:#131313;
}
#reveal-shadow {
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  opacity:0;
}
@keyframes fold-fwd {
  0%   { background: linear-gradient(to left,  rgba(0,0,0,0.00) 0%, rgba(0,0,0,0.00) 100%); }
  20%  { background: linear-gradient(to left,  rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.18) 45%, rgba(0,0,0,0.00) 70%); }
  50%  { background: rgba(0,0,0,0.52); }
  80%  { background: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.18) 45%, rgba(0,0,0,0.00) 70%); }
  100% { background: rgba(0,0,0,0.00); }
}
@keyframes fold-bwd {
  0%   { background: linear-gradient(to right, rgba(0,0,0,0.00) 0%, rgba(0,0,0,0.00) 100%); }
  20%  { background: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.18) 45%, rgba(0,0,0,0.00) 70%); }
  50%  { background: rgba(0,0,0,0.52); }
  80%  { background: linear-gradient(to left,  rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.18) 45%, rgba(0,0,0,0.00) 70%); }
  100% { background: rgba(0,0,0,0.00); }
}
@keyframes reveal-fwd {
  0%   { opacity:0; background: linear-gradient(to right, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.08) 45%, transparent 70%); }
  30%  { opacity:1; }
  100% { opacity:0; }
}
@keyframes reveal-bwd {
  0%   { opacity:0; background: linear-gradient(to left, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.08) 45%, transparent 70%); }
  30%  { opacity:1; }
  100% { opacity:0; }
}
.zone {
  position:absolute;
  top:0; height:100%;
  width:22%;
  z-index:10;
  cursor:pointer;
}
#zone-l { left:0; }
#zone-r { right:0; }
.glow {
  position:absolute;
  top:0; height:100%;
  width:40%;
  z-index:9;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.4s ease;
}
#glow-l {
  left:0;
  background:radial-gradient(ellipse 85% 65% at 0% 50%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.07) 38%, transparent 68%);
}
#glow-r {
  right:0;
  background:radial-gradient(ellipse 85% 65% at 100% 50%, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.07) 38%, transparent 68%);
}
</style>
</head>
<body>
<div class="stage">
  <div id="book">
    <div class="pg-under"><img id="img-under" src="" alt=""></div>
    <div class="pg-top" id="pg-top"><img id="img-top" src="" alt=""></div>
    <div id="flipper">
      <div class="face face-front">
        <img id="flip-f" src="" alt="">
        <div id="fold-shadow"></div>
      </div>
      <div class="face face-back"></div>
    </div>
    <div id="reveal-shadow"></div>
    <div class="zone" id="zone-l"></div>
    <div class="zone" id="zone-r"></div>
    <div class="glow"  id="glow-l"></div>
    <div class="glow"  id="glow-r"></div>
  </div>
</div>
<script>
const IMGS = [
  'images/C6BEE7C8-F42D-4B14-8D75-CC4DA3715503.JPG',
  'images/IMG_0005.jpeg',
  'images/IMG_0007.jpeg',
  'images/IMG_0031.jpeg',
  'images/IMG_0171.jpeg',
  'images/IMG_0174.jpeg',
  'images/IMG_0175.jpeg',
  'images/IMG_1675.jpg',
  'images/IMG_1986.JPG',
  'images/IMG_2409.jpeg',
  'images/IMG_2612.jpeg',
  'images/IMG_2613.jpeg',
  'images/IMG_4524.jpeg',
  'images/IMG_4529.jpeg',
  'images/IMG_6572.jpeg',
  'images/IMG_8476.jpeg',
  'images/IMG_8557.jpeg',
  'images/IMG_8558.jpeg',
  'images/IMG_8562.jpeg',
  'images/IMG_9980.jpeg'
];

const DUR = 660;
let cur = 0, busy = false;

const book         = document.getElementById('book');
const imgTop       = document.getElementById('img-top');
const imgUnder     = document.getElementById('img-under');
const flipper      = document.getElementById('flipper');
const flipF        = document.getElementById('flip-f');
const pgTop        = document.getElementById('pg-top');
const glowL        = document.getElementById('glow-l');
const glowR        = document.getElementById('glow-r');
const foldShadow   = document.getElementById('fold-shadow');
const revealShadow = document.getElementById('reveal-shadow');

function sizeBook(src, cb) {
  const p = new Image();
  p.onload = () => {
    const ar   = p.naturalWidth / p.naturalHeight;
    const maxH = window.innerHeight * 0.88;
    const maxW = window.innerWidth  * 0.90;
    let h = maxH, w = h * ar;
    if (w > maxW) { w = maxW; h = w / ar; }
    book.style.width  = Math.round(w) + 'px';
    book.style.height = Math.round(h) + 'px';
    if (cb) cb();
  };
  p.src = src;
}

function preload(i) {
  if (i >= 0 && i < IMGS.length) { const p = new Image(); p.src = IMGS[i]; }
}

function init() {
  sizeBook(IMGS[0], () => {
    imgTop.src   = IMGS[0];
    imgUnder.src = IMGS[1] || '';
    preload(2); preload(3);
  });
}

function stopAnimations() {
  foldShadow.style.animation   = 'none';
  revealShadow.style.animation = 'none';
  revealShadow.style.opacity   = '0';
}

function flip(dir) {
  if (busy) return;
  const nxt = cur + dir;
  if (nxt < 0 || nxt >= IMGS.length) return;
  busy = true;
  glowL.style.opacity = '0';
  glowR.style.opacity = '0';
  imgUnder.src = IMGS[nxt];
  flipF.src = IMGS[cur];
  flipper.style.transformOrigin = dir === 1 ? '0% 50%' : '100% 50%';
  flipper.style.transition = 'none';
  flipper.style.transform  = 'rotateY(0deg)';
  pgTop.style.visibility   = 'hidden';
  flipper.style.visibility = 'visible';
  stopAnimations();
  flipper.offsetHeight;
  const foldKf   = dir === 1 ? 'fold-fwd'   : 'fold-bwd';
  const revealKf = dir === 1 ? 'reveal-fwd' : 'reveal-bwd';
  foldShadow.style.animation   = `${foldKf}   ${DUR}ms ease-in-out forwards`;
  revealShadow.style.animation = `${revealKf} ${DUR}ms ease-in-out forwards`;
  flipper.style.transition = `transform ${DUR}ms cubic-bezier(0.35, 0, 0.15, 1)`;
  flipper.style.transform  = `rotateY(${dir === 1 ? -180 : 180}deg)`;
  setTimeout(() => {
    cur = nxt;
    flipper.style.visibility = 'hidden';
    flipper.style.transition = 'none';
    flipper.style.transform  = 'rotateY(0deg)';
    stopAnimations();
    imgTop.src             = IMGS[cur];
    pgTop.style.visibility = '';
    preload(cur + 1); preload(cur + 2); preload(cur - 1);
    if (IMGS[cur + 1]) imgUnder.src = IMGS[cur + 1];
    busy = false;
  }, DUR + 30);
}

document.getElementById('zone-r').addEventListener('click', () => flip(1));
document.getElementById('zone-l').addEventListener('click', () => flip(-1));
document.getElementById('zone-r').addEventListener('mouseenter', () => { if (!busy && cur < IMGS.length - 1) glowR.style.opacity = '1'; });
document.getElementById('zone-r').addEventListener('mouseleave', () => { glowR.style.opacity = '0'; });
document.getElementById('zone-l').addEventListener('mouseenter', () => { if (!busy && cur > 0) glowL.style.opacity = '1'; });
document.getElementById('zone-l').addEventListener('mouseleave', () => { glowL.style.opacity = '0'; });
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') flip(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   flip(-1);
});
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.changedTouches[0].clientX; }, { passive: true });
document.addEventListener('touchend',   e => { const dx = e.changedTouches[0].clientX - tx; if (Math.abs(dx) > 50) flip(dx < 0 ? 1 : -1); });
window.addEventListener('resize', () => sizeBook(IMGS[cur]));
init();
</script>
</body>
</html>
